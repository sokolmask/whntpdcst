name: Deploy to carbon

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to carbon via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CARBON_HOST }}
          username: sokolmask
          key: ${{ secrets.CARBON_SSH_KEY }}
          script: |
            set -e
            SKILL_DIR="/home/sokolmask/hermes-data/skills/podcast"
            PODCAST_DIR="/home/sokolmask/hermes-data/podcast"

            # Pull latest code
            cd "$SKILL_DIR"
            git pull origin main

            # Sync cover art to podcast data dir
            cp cover.jpg "$PODCAST_DIR/cover.jpg"

            # Install/update Python deps via uv
            docker exec hermes uv pip install -q -r /opt/data/skills/podcast/requirements.txt || true

            # Restart static server if docker config changed
            cd "$SKILL_DIR/docker"
            docker compose restart podcast-static

            echo "Deploy done."
