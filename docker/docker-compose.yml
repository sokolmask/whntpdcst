version: "3.8"

# Static file server for the AI podcast.
# Serves: /home/sokolmask/hermes-data/podcast/ on port 8085 (LAN-only).
# NPM then proxies whntpdcst.com → localhost:8085.

services:
  podcast-static:
    image: nginx:alpine
    container_name: podcast-static
    restart: unless-stopped
    ports:
      - "127.0.0.1:8085:80"
    volumes:
      - /home/sokolmask/hermes-data/podcast:/usr/share/nginx/html:ro
      - /home/sokolmask/hermes-data/skills/podcast/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/sokolmask/hermes-data/podcast/logs:/var/log/podcast

  # Admin panel: LAN-only on :8086, HTTP Basic auth (ADMIN_USER/ADMIN_PASSWORD).
  # Not exposed through the Cloudflare tunnel.
  podcast-admin:
    build:
      context: .
      dockerfile: admin.Dockerfile
    container_name: podcast-admin
    restart: unless-stopped
    ports:
      - "8086:8000"
    volumes:
      - /home/sokolmask/hermes-data:/opt/data
    env_file:
      - /home/sokolmask/hermes-agent/.env
