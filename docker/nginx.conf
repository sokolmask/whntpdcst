server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    charset utf-8;
    autoindex off;

    # CORS — needed by Apple Podcasts and podcast clients
    add_header Access-Control-Allow-Origin  "*"                                          always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS"                         always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;

    if ($request_method = OPTIONS) { return 204; }

    location = /feed.xml {
        add_header Content-Type  "application/rss+xml; charset=UTF-8" always;
        add_header Cache-Control "public, max-age=3600"                always;
    }

    location /episodes/ {
        add_header Content-Type  "audio/mpeg"              always;
        add_header Accept-Ranges "bytes"                   always;
        add_header Cache-Control "public, max-age=86400"   always;

        # Persisted download log for the admin panel's episode analytics
        # (default access_log goes to /dev/stdout only, lost on log rotation)
        access_log /var/log/nginx/access.log main;
        access_log /var/log/podcast/episodes.log main;

        # Block non-mp3 files
        location ~* ^/episodes/.+(?<!\.mp3)$ { return 404; }
    }

    location /digests/ {
        add_header Cache-Control "public, max-age=86400" always;

        # .html served with default text/html + charset from server block
        location ~* \.md$ {
            add_header Content-Type  "text/markdown; charset=UTF-8" always;
            add_header Cache-Control "public, max-age=86400"        always;
        }

        # Block everything except .md and .html
        location ~* ^/digests/.+(?<!\.md)(?<!\.html)$ { return 404; }
    }

    location = /cover.jpg {
        add_header Content-Type  "image/jpeg"               always;
        add_header Cache-Control "public, max-age=604800"   always;
    }

    # Static site (landing/podcast/blog) built by site/build_site.py
    location / {
        root /usr/share/nginx/html/site;
        index index.html;
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=300" always;
    }
}
